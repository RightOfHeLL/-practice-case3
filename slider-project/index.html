<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой слайдер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="slider-container">
        <!--Счёт-->
        <div class="slider-counter" id="counter">Изображение 1 из 5</div>
        
        <!--Картинки-->
        <div class="slider-image-wrapper">
            <img id="slider-img" src="" alt="Слайд">
        </div>
        
        <!--Кнопки-->
        <div class="slider-controls">
            <button id="btn-prev" class="slider-btn">🡄 Назад</button>
            <button id="btn-next" class="slider-btn">Вперед 🡆</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
